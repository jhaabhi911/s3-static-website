<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello EPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 50px;
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      max-width: 600px;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
    }

    h2 {
      font-weight: 400;
      margin-bottom: 25px;
      color: #a8e6cf;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.9;
    }

    .highlight {
      color: #00ffd5;
      font-weight: 600;
    }

    .tag {
      margin-top: 30px;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 20px;
      background: #00ffd5;
      color: #000;
      font-weight: 600;
      animation: pulse 2s infinite;
    }

    footer {
      margin-top: 25px;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hi, EPAM Systems! 👋</h1>
    <h2>Hello from <span class="highlight">Abhishek Jha</span> 😊</h2>

    <p>
      Just a small demo, but built with a lot of curiosity and learning.<br>
      This page is automatically deployed using a CI/CD pipeline powered by GitHub Actions and AWS S3.
    </p>

    <div class="tag">🚀 Deployed via CI/CD</div>
    <footer>
      Thanks for taking a look!
    </footer>
  </div>

</body>
</html>
